{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="auth-container glass-panel" style="max-width: 600px;">
        <div class="auth-header">
            <h2>Add Equipment</h2>
            <p>Give your tools on rent and earn</p>
        </div>

        <!-- 🔥 IMPORTANT CHANGE: enctype added -->
        <form action="{{ url_for('add_equipment') }}" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="name">Equipment Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Mahindra 575 Tractor"
                    required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-control" required
                    style="background-color: var(--bg-dark);">
                    <option value="Tractor">Tractor</option>
                    <option value="Harvester">Harvester</option>
                    <option value="Seeder">Seeder</option>
                    <option value="Sprayer">Sprayer</option>
                    <option value="Plough">Plough</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price (₹ per day)</label>
                <input type="number" id="price" name="price" class="form-control" placeholder="1000" min="1" required>
            </div>

            <div class="form-group">
                <label for="location">Location (City/State)</label>
                <input type="text" id="location" name="location" class="form-control"
                    placeholder="e.g. Ludhiana, Punjab" required>
            </div>

            <div style="display: flex; gap: 16px;">
                <div class="form-group" style="flex: 1;">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" class="form-control" value="1" min="1" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="damage_charge">Damage Charge (₹)</label>
                    <input type="number" id="damage_charge" name="damage_charge" class="form-control" value="500" min="0" required>
                </div>
            </div>

            <!-- 🔥 CHANGE: text → file upload -->
            <div class="form-group">
                <label for="image">Upload Image</label>
                <input type="file" id="image" name="image" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-accent btn-block" style="margin-top: 20px;">List Item for Rent</button>
        </form>
    </div>
</div>
{% endblock %}
