{% extends "layout.html" %}
{% block content %}
<style>
    .auth-toggle {
        display: flex;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        margin-bottom: 25px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .toggle-btn {
        flex: 1;
        padding: 12px 0;
        text-align: center;
        cursor: pointer;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        z-index: 1;
        transition: color 0.3s ease;
    }
    .toggle-btn.active {
        color: #fff;
    }
    .toggle-slider {
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 100%;
        background: var(--accent-light, #f39c12);
        border-radius: 8px;
        transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        z-index: 0;
    }
    .login-section {
        display: none;
        animation: fadeIn 0.4s ease forwards;
    }
    .login-section.active {
        display: block;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="container">
    <div class="auth-container glass-panel">
        <div class="auth-header" style="margin-bottom: 20px;">
            <h2>Login</h2>
            <p>Welcome back to AgriRent</p>
        </div>
        
        <div class="auth-toggle">
            <div class="toggle-slider" id="toggleSlider"></div>
            <div class="toggle-btn active" id="userToggle" onclick="switchLogin('user')">User Login</div>
            <div class="toggle-btn" id="adminToggle" onclick="switchLogin('admin')">Admin Login</div>
        </div>

        <form action="{{ url_for('login') }}" method="POST" id="userForm" class="login-section active">
            <input type="hidden" name="login_type" value="user">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username (eg. maheshkoli)" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-pop btn-block" style="margin-top: 10px;">Login as User</button>
            
            <div style="text-align: center; margin: 15px 0;">
                <span style="opacity: 0.5;">— OR —</span>
            </div>
            
            <button type="button" id="bioLoginBtn" class="cyber-btn" style="width: 100%; border-radius: 25px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fas fa-fingerprint"></i> Login with Fingerprint
            </button>

            <!-- Biometric Modal -->
            <div id="bioModal" class="bio-modal" style="display: none;">
                <div class="bio-modal-content">
                    <div class="pulse"></div>
                    <div class="scanner-container">
                        <div class="scanner-line"></div>
                        <i class="fas fa-fingerprint fingerprint-icon"></i>
                    </div>
                    <h3 id="bioTitle">Biometric Login</h3>
                    <p id="bioDesc">Please verify your fingerprint to continue.</p>
                    <div id="bioStatus" class="bio-status">AWAITING SCAN...</div>
                    <button type="button" id="cancelBio" class="cyber-btn">Cancel</button>
                </div>
            </div>
        </form>

        <form action="{{ url_for('login') }}" method="POST" id="adminForm" class="login-section">
            <input type="hidden" name="login_type" value="admin">
            <div class="form-group">
                <label for="admin_email">Admin Email</label>
                <input type="email" id="admin_email" name="admin_email" class="form-control" placeholder="Enter custom admin email">
            </div>
            <div class="form-group">
                <label for="admin_password">Admin Password</label>
                <input type="password" id="admin_password" name="admin_password" class="form-control" placeholder="Enter custom admin password">
            </div>
            <button type="submit" class="btn btn-pop btn-block" style="margin-top: 10px; background: #e74c3c;">Login as Admin</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p>Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-light);">Register</a></p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const bioLoginBtn = document.getElementById('bioLoginBtn');
        const bioModal = document.getElementById('bioModal');
        const bioStatus = document.getElementById('bioStatus');
        const cancelBio = document.getElementById('cancelBio');

        if (bioLoginBtn) {
            bioLoginBtn.addEventListener('click', async () => {
                const username = document.getElementById('username').value;
                if (!username) {
                    alert("Please enter your username first to login with fingerprint.");
                    return;
                }

                bioModal.style.display = 'flex';
                bioStatus.textContent = 'AWAITING SCAN...';
                bioStatus.className = 'bio-status';

                try {
                    const result = await BioAuth.authenticate(username);
                    if (result.success) {
                        bioStatus.textContent = 'VERIFICATION SUCCESSFUL';
                        bioStatus.className = 'bio-status bio-success-text';
                        
                        // Notify server to set session
                        const loginRes = await fetch('/bio_login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username })
                        });
                        const loginData = await loginRes.json();
                        
                        if (loginData.success) {
                            setTimeout(() => {
                                window.location.href = "{{ url_for('dashboard') }}";
                            }, 1000);
                        } else {
                            throw new Error(loginData.error);
                        }
                    } else {
                        throw new Error(result.error || 'Verification failed');
                    }
                } catch (err) {
                    console.error(err);
                    bioStatus.textContent = 'VERIFICATION FAILED';
                    bioStatus.className = 'bio-status bio-error-text';
                    setTimeout(() => {
                        bioModal.style.display = 'none';
                    }, 2000);
                }
            });
        }

        if (cancelBio) {
            cancelBio.addEventListener('click', () => {
                bioModal.style.display = 'none';
            });
        }
    });

    function switchLogin(type) {
        const userForm = document.getElementById('userForm');
        const adminForm = document.getElementById('adminForm');
        const userToggle = document.getElementById('userToggle');
        const adminToggle = document.getElementById('adminToggle');
        const slider = document.getElementById('toggleSlider');

        if (type === 'admin') {
            userForm.classList.remove('active');
            adminForm.classList.add('active');
            userToggle.classList.remove('active');
            adminToggle.classList.add('active');
            slider.style.transform = 'translateX(100%)';
            document.getElementById('admin_email').required = true;
            document.getElementById('admin_password').required = true;
            document.getElementById('username').required = false;
            document.getElementById('password').required = false;
        } else {
            adminForm.classList.remove('active');
            userForm.classList.add('active');
            adminToggle.classList.remove('active');
            userToggle.classList.add('active');
            slider.style.transform = 'translateX(0)';
            document.getElementById('username').required = true;
            document.getElementById('password').required = true;
            document.getElementById('admin_email').required = false;
            document.getElementById('admin_password').required = false;
        }
    }
</script>
{% endblock %}
