{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="auth-container glass-panel" style="max-width: 800px;">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join the AgriRent community</p>
        </div>
        <form action="{{ url_for('register') }}" method="POST">
            <h4 style="margin-bottom: 15px; border-bottom: 2px solid var(--accent-color); display: inline-block;">Personal Information</h4>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" placeholder="e.g. Mahesh Kumar" required>
                </div>
                <div class="form-group">
                    <label for="phone">Contact Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" pattern="[0-9]{10}" placeholder="10-digit mobile number" required title="Please enter a 10-digit phone number">
                </div>
                <div class="form-group">
                    <label for="username">Choose a Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="e.g. kisan_raj" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Create a strong password" required>
                </div>
            </div>

            <h4 style="margin-bottom: 15px; border-bottom: 2px solid var(--accent-color); display: inline-block;">Address Details</h4>
            <div class="form-group">
                <label for="address">Address Line</label>
                <input type="text" id="address" name="address" class="form-control" placeholder="House No, Street, Landmark" required>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="form-group">
                    <label for="area">Area / Village</label>
                    <input type="text" id="area" name="area" class="form-control" placeholder="Area Name" required>
                </div>
                <div class="form-group">
                    <label for="city">City / Town</label>
                    <input type="text" id="city" name="city" class="form-control" placeholder="City" required>
                </div>
                <div class="form-group">
                    <label for="district">District</label>
                    <input type="text" id="district" name="district" class="form-control" placeholder="District" required>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" class="form-control" placeholder="State" required>
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country" class="form-control" style="background: var(--bg-dark);" required>
                        <option value="India">India</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-accent btn-block" style="margin-top: 10px; font-size: 1.1rem; padding: 12px;">Complete Registration</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <p>Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-light);">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
