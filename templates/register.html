{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="auth-container glass-panel" style="max-width: 800px;">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join the AgriRent community</p>
        </div>
        <form id="registerForm" action="{{ url_for('register') }}" method="POST">
            <h4 style="margin-bottom: 15px; border-bottom: 2px solid var(--accent-color); display: inline-block;">
                Personal Information</h4>
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control"
                        placeholder="e.g. Mahesh Kumar" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control"
                        placeholder="e.g. mahesh@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Contact Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" pattern="[0-9]{10}"
                        placeholder="10-digit mobile number" required title="Please enter a 10-digit phone number">
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Enter username (eg. maheshkoli)" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter password" required>
                </div>
            </div>

            <h4 style="margin-bottom: 15px; border-bottom: 2px solid var(--accent-color); display: inline-block;">
                Address Details</h4>
            <div class="form-group">
                <label for="address">Address Line</label>
                <input type="text" id="address" name="address" class="form-control"
                    placeholder="House No, Street, Landmark" required>
            </div>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="form-group">
                    <label for="area">Area / Village</label>
                    <input type="text" id="area" name="area" class="form-control" placeholder="Area Name" required>
                </div>
                <div class="form-group">
                    <label for="city">City / Town</label>
                    <input type="text" id="city" name="city" class="form-control" placeholder="City" required>
                </div>
                <div class="form-group">
                    <label for="district">District</label>
                    <input type="text" id="district" name="district" class="form-control" placeholder="District"
                        required>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" class="form-control" placeholder="State" required>
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country" class="form-control" style="background: var(--bg-dark);"
                        required>
                        <option value="India">India</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
            </div>

            <input type="hidden" name="credential_id" id="credential_id">
            <input type="hidden" name="public_key" id="public_key">

            <button type="submit" id="registerBtn" class="btn btn-accent btn-block"
                style="margin-top: 10px; font-size: 1.1rem; padding: 12px;">Complete Registration</button>
        </form>

        <!-- Biometric Modal -->
        <div id="bioModal" class="bio-modal" style="display: none;">
            <div class="bio-modal-content">
                <div class="pulse"></div>
                <div class="scanner-container">
                    <div class="scanner-line"></div>
                    <i class="fas fa-fingerprint fingerprint-icon"></i>
                </div>
                <h3 id="bioTitle">Register Your Fingerprint</h3>
                <p id="bioDesc">Please verify your device biometric to secure your account.</p>
                <div id="bioStatus" class="bio-status">AWAITING SCAN...</div>
                <button type="button" id="cancelBio" class="cyber-btn">Cancel</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <p>Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-light);">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
