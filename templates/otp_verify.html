{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="auth-container glass-panel" style="max-width: 450px; text-align: center;">
        <div class="auth-header">
            <h2 style="font-size: 2rem;">OTP Verification</h2>
            <p>Enter the 6-digit code sent to your mobile</p>
        </div>
        
        <div style="font-size: 3rem; margin-bottom: 20px; opacity: 0.9;">🔐</div>

        <form action="{{ url_for('process_payment') }}" method="POST">
            <div class="form-group">
                <label for="otp" style="font-size: 1.1rem; margin-bottom: 15px; display: block;">Verification Code</label>
                <input type="text" id="otp" name="otp" class="form-control" 
                       placeholder="XXXXXX" maxlength="6" pattern="\d{6}" required 
                       style="text-align: center; font-size: 1.5rem; letter-spacing: 15px; font-weight: bold; padding: 15px;"
                       autofocus>
            </div>
            
            <p style="font-size: 0.9rem; opacity: 0.7; margin: 20px 0;">
                The code will expire in <span id="timer">02:00</span> minutes.
            </p>

            <button type="submit" class="btn btn-accent btn-block" style="font-size: 1.1rem; padding: 12px;">Verify & Proceed to Payment</button>
        </form>
        
        <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <a href="{{ url_for('dashboard') }}" style="color: #ff4d4d; text-decoration: none; font-size: 0.95rem;">Cancel Transaction</a>
        </div>
    </div>
</div>

<script>
    // Countdown timer for OTP
    let timeLeft = 120;
    const timerElement = document.getElementById('timer');
    
    const countdown = setInterval(function() {
        if(timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.textContent = "00:00";
            timerElement.style.color = "#ff4d4d";
        } else {
            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);

    // Auto-focus and numeric entry enhancement
    document.getElementById('otp').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>
{% endblock %}
